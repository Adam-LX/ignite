        - { text: "Engram vibes — but make it a crate!", weight: 1 }
        - { text: "Victory Royale energy, but the prize is a box!", weight: 2 }
        - { text: "Diamond pickaxe energy in cardboard packaging!", weight: 1 }
        - { text: "Sus crate. Definitely not the impostor. Probably.", weight: 2 }
        - { text: "High noon for loot! Draw on that lid!", weight: 1 }
