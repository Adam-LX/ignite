        - { text: "More tension than overtime on Dust Two!", weight: 2 }
        - { text: "Unbox protocol initiated! Gloves optional, vibes mandatory!", weight: 2 }
        - { text: "Skin market who? We rain free cosmetics now!", weight: 1 }
        - { text: "Hotter than a crimson web and twice as suspicious!", weight: 2 }
        - { text: "Call mid! Call B! Call the crate!", weight: 2 }
        - { text: "This drop has Eco-round desperation and full-buy swagger!", weight: 1 }
        - { text: "Clutch crate! Save it for the highlight reel!", weight: 2 }
        - { text: "Ace energy in cardboard form — open it!", weight: 2 }
        - { text: "That's not a decoy — that's premium loot!", weight: 1 }
        - { text: "Flashbang the suspense! I'm peeking the box!", weight: 1 }
        - { text: "It's dangerous to go alone — take this crate!", weight: 2 }
        - { text: "It's-a me! Mystery box!", weight: 2 }
        - { text: "Hey you. You're finally awake. Here's a crate.", weight: 2 }
        - { text: "Hmm. A crate. Interesting.", weight: 1 }
        - { text: "The cake is a crate!", weight: 2 }
        - { text: "These aren't the crates you're looking for. Oh wait — they are!", weight: 2 }
