    crate_drop:
      <<: *hype
      cooldown_sec: 0.5
      lines:
        - { text: "Hold up — is that a loot crate falling from the sky?", weight: 2 }
        - { text: "Ladies and gentlemen, we have a drop!", weight: 2 }
        - { text: "Something shiny just crash-landed on the pitch!", weight: 2 }
        - { text: "Post-match present incoming! Don't blink!", weight: 2 }
        - { text: "Lady Luck just mailed us a mystery box!", weight: 2 }
        - { text: "Is it a car? Is it wheels? It's a mystery box!", weight: 2 }
        - { text: "Someone call security — a crate just trespassed!", weight: 1 }
        - { text: "Loot drop! The crowd goes mildly unhinged!", weight: 2 }
        - { text: "That's not a rebound — that's a present!", weight: 1 }
        - { text: "Special delivery from the rocket gods! Sign here for chaos!", weight: 2 }
        - { text: "Box from the heavens! Popcorn ready!", weight: 2 }
        - { text: "Oh no. Oh yes. A crate!", weight: 2 }
        - { text: "The algorithm felt generous today!", weight: 1 }
        - { text: "Treasure chest vibes on the pitch!", weight: 1 }
        - { text: "Don't open it with your bumper. Or do!", weight: 1 }
        - { text: "A wild crate appears!", weight: 2 }
        - { text: "Post-game care package! Contents: classified!", weight: 2 }
        - { text: "That thud was either a goal post or free cosmetics!", weight: 1 }
        - { text: "Free loot? In this economy? Let's go!", weight: 2 }
        - { text: "The sky is raining boxes and I am here for it!", weight: 1 }
        - { text: "It's raining crates and loot!", weight: 2 }
        - { text: "Somebody ordered chaos and it arrived in a crate!", weight: 2 }
        - { text: "If this is empty I'm filing a complaint with the universe!", weight: 1 }
        - { text: "The suspense is thicker than boost smoke!", weight: 2 }
        - { text: "Please be wheels. Please be wheels. Okay I'll take anything!", weight: 1 }
        - { text: "That box is vibrating with bad decisions!", weight: 2 }
        - { text: "I can smell the rarity from here. Or maybe that's the tires.", weight: 1 }
        - { text: "Open it slow. Or smash it. I'm not your boss!", weight: 1 }
        - { text: "It's giving main-character energy in cardboard form!", weight: 2 }
        - { text: "Bonus round unlocked: stare at a box!", weight: 1 }
        - { text: "My grandma collects stamps. We collect falling crates!", weight: 1 }
        - { text: "Congratulations, you played yourself into free stuff!", weight: 2 }
        - { text: "Is this legal? Asking for a friend with a garage!", weight: 1 }
        - { text: "The crate landed harder than my last aerial!", weight: 2 }
        - { text: "Plot twist: the real match was the loot we found along the way!", weight: 1 }
        - { text: "Don't mind me, I'm emotionally attached to this box already!", weight: 1 }
        - { text: "Shake it! If it rattles, it's either wheels or disappointment!", weight: 2 }
        - { text: "Crate check! Ego check! Let's get weird!", weight: 1 }
        - { text: "This is the part where we all pretend we deserved it!", weight: 2 }
        - { text: "I would trade my boost for a peek inside!", weight: 1 }
        - { text: "And the crowd whispers: ooh, shiny!", weight: 2 }
        # Nucenie / mini-śpiew (XTTS celebration lubi melodie w tekście)
        - { text: "Hmm hmm hmm... look what floated down!", weight: 2 }
        - { text: "Doo doo doo doo — surprise in a box!", weight: 2 }
        - { text: "La la laa — crate song, everybody!", weight: 2 }
        - { text: "Bum bum buuum — loot o'clock!", weight: 2 }
        - { text: "Naa naa naa, naa naa naa — open the crate!", weight: 1 }
        - { text: "I'm humming the jackpot tune, don't judge me!", weight: 2 }
        - { text: "Doobie doo — something rare this way comes!", weight: 1 }
        - { text: "Hmm-mm, that thud had melody!", weight: 1 }
        - { text: "Laa-dee-daa, free cosmetics falling from heaven!", weight: 2 }
        - { text: "Doo-wop doo-wop — crate drop harmony!", weight: 1 }
