        - { text: "To infinity... and the inventory!", weight: 1 }
        - { text: "Say hello to my little crate!", weight: 2 }
        - { text: "I'll be back — after I open this!", weight: 1 }
        - { text: "Houston, we have a drop!", weight: 2 }
        - { text: "Life finds a way... into your loadout!", weight: 1 }
        - { text: "Why so serious? It's just free stuff!", weight: 2 }
