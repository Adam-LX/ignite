# Bank komentatora Ignite — EN, radio-net esport (dynamiczny, nie flegmatyczny).
# Głosy XTTS: commentator_excited / tense / celebration.

defaults: &defaults
  voice: commentator_excited
  temperature: 0.72
  speed: 1.12

tense: &tense
  voice: commentator_tense
  temperature: 0.68
  speed: 1.14

hype: &hype
  voice: commentator_celebration
  temperature: 0.78
  speed: 1.1

locales:
  en:
    goal:
      <<: *hype
      cooldown_sec: 3.2
      lines:
        - { text: "What a strike! Goal!", weight: 2 }
        - { text: "They find the net! Goal!", weight: 2 }
        - { text: "Unstoppable! That's a goal!", weight: 1 }
        - { text: "Ripples the net! Goal!", weight: 1 }
        - { text: "Put a bow on it! Goal!", weight: 1 }
        - { text: "That's going on the highlight reel! Goal!", weight: 1 }

    epic_save:
      <<: *defaults
      cooldown_sec: 3.8
      lines:
        - { text: "What a save!", weight: 2 }
        - { text: "Denied at the last second!", weight: 2 }
        - { text: "Incredible stop!", weight: 1 }
        - { text: "Keeper comes up huge!", weight: 1 }
        - { text: "Not today! What a denial!", weight: 1 }

    demolish:
      <<: *defaults
      cooldown_sec: 2.8
      lines:
        - { text: "Demolished!", weight: 2 }
        - { text: "Taken out of the play!", weight: 1 }
        - { text: "Absolute demolition!", weight: 1 }
        - { text: "That car just became modern art!", weight: 1 }
        - { text: "Send flowers! Demolished!", weight: 1 }

    kickoff:
      <<: *defaults
      cooldown_sec: 10.0
      lines:
        - { text: "Here we go!", weight: 2 }
        - { text: "Let's light it up!", weight: 1 }
        - { text: "Round starts now!", weight: 1 }
        - { text: "Engines hot! Let's dance!", weight: 1 }

    # Kickoff + ostatnie 10 s meczu — osobne cyfry.
    countdown_10:
      <<: *tense
      speed: 1.18
      cooldown_sec: 0.35
      lines:
        - { text: "Ten!", weight: 1 }

    countdown_9:
      <<: *tense
      speed: 1.18
      cooldown_sec: 0.35
      lines:
        - { text: "Nine!", weight: 1 }

    countdown_8:
      <<: *tense
      speed: 1.2
      cooldown_sec: 0.35
      lines:
        - { text: "Eight!", weight: 1 }

    countdown_7:
      <<: *tense
      speed: 1.2
      cooldown_sec: 0.35
      lines:
        - { text: "Seven!", weight: 1 }

    countdown_6:
      <<: *tense
      speed: 1.22
      cooldown_sec: 0.35
      lines:
        - { text: "Six!", weight: 1 }

    countdown_5:
      <<: *tense
      speed: 1.22
      cooldown_sec: 0.35
      lines:
        - { text: "Five!", weight: 1 }

    countdown_4:
      <<: *tense
      speed: 1.24
      cooldown_sec: 0.35
      lines:
        - { text: "Four!", weight: 1 }

    countdown_3:
      <<: *tense
      speed: 1.26
      cooldown_sec: 0.35
      lines:
        - { text: "Three!", weight: 1 }

    countdown_2:
      <<: *tense
      speed: 1.28
      cooldown_sec: 0.35
      lines:
        - { text: "Two!", weight: 1 }

    countdown_1:
      <<: *tense
      speed: 1.3
      cooldown_sec: 0.35
      lines:
        - { text: "One!", weight: 1 }

    countdown_go:
      <<: *hype
      temperature: 0.8
      speed: 1.05
      cooldown_sec: 6.0
      lines:
        - { text: "Go!", weight: 2 }
        - { text: "Ignition!", weight: 1 }

    clock_60:
      <<: *tense
      cooldown_sec: 25.0
      lines:
        - { text: "One minute remaining!", weight: 2 }
        - { text: "Sixty seconds on the clock!", weight: 1 }
        - { text: "Final minute! Make it count!", weight: 1 }

    clock_30:
      <<: *tense
      cooldown_sec: 20.0
      lines:
        - { text: "Thirty seconds left!", weight: 2 }
        - { text: "Half a minute! Push!", weight: 1 }
        - { text: "Thirty seconds! This is crunch time!", weight: 1 }

    power_shot:
      <<: *defaults
      cooldown_sec: 3.8
      lines:
        - { text: "Power shot!", weight: 2 }
        - { text: "What a rocket!", weight: 1 }
        - { text: "Cannon fire!", weight: 1 }
        - { text: "That ball just applied for citizenship in orbit!", weight: 1 }

    flip_reset:
      <<: *defaults
      cooldown_sec: 4.5
      lines:
        - { text: "Flip reset!", weight: 2 }
        - { text: "They reset mid-air!", weight: 1 }
        - { text: "Style points incoming!", weight: 1 }

    aerial:
      <<: *defaults
      cooldown_sec: 4.2
      lines:
        - { text: "What an aerial!", weight: 2 }
        - { text: "Airborne challenge!", weight: 1 }
        - { text: "They're writing poetry up there!", weight: 1 }

    post_hit:
      <<: *defaults
      cooldown_sec: 3.8
      lines:
        - { text: "Off the post!", weight: 2 }
        - { text: "Rattles the woodwork!", weight: 1 }
        - { text: "So close off the bar!", weight: 1 }
        - { text: "The post says absolutely not!", weight: 1 }

    near_miss:
      <<: *defaults
      cooldown_sec: 4.5
      lines:
        - { text: "Oh, so close!", weight: 2 }
        - { text: "Just wide!", weight: 1 }
        - { text: "Nearly!", weight: 1 }
        - { text: "The woodwork says no!", weight: 1 }
        - { text: "That was a postcard away from glory!", weight: 1 }

    blue_ahead:
      <<: *defaults
      cooldown_sec: 7.5
      lines:
        - { text: "Blue takes the lead!", weight: 2 }
        - { text: "Blue are ahead!", weight: 1 }
        - { text: "Blue hit the nitrous!", weight: 1 }

    orange_ahead:
      <<: *defaults
      cooldown_sec: 7.5
      lines:
        - { text: "Orange takes the lead!", weight: 2 }
        - { text: "Orange are ahead!", weight: 1 }
        - { text: "Orange just turned up the heat!", weight: 1 }

    overtime:
      <<: *hype
      cooldown_sec: 12.0
      lines:
        - { text: "Overtime! Next goal wins!", weight: 2 }
        - { text: "Sudden death! Who wants it more?!", weight: 1 }
        - { text: "Extra time! Somebody write a legend!", weight: 1 }

    match_end:
      <<: *defaults
      cooldown_sec: 15.0
      lines:
        - { text: "That's the match!", weight: 2 }
        - { text: "Final whistle! What a game!", weight: 1 }
        - { text: "Match over!", weight: 1 }
        - { text: "Book it! What a show!", weight: 1 }

    # Sytuacyjne wstawki — scramble / turtle / 50-50 / idle ball.
    scramble:
      <<: *defaults
      cooldown_sec: 9.0
      lines:
        - { text: "It's a parking lot out there!", weight: 2 }
        - { text: "Everybody wants the ball!", weight: 2 }
        - { text: "Chaos in the box!", weight: 1 }
        - { text: "Pinball machine activated!", weight: 1 }
        - { text: "Someone order a traffic cone!", weight: 1 }
        - { text: "Four bumpers, one ball, zero manners!", weight: 1 }
        - { text: "Midfield just turned into a mosh pit!", weight: 1 }

    turtle:
      <<: *defaults
      cooldown_sec: 8.0
      lines:
        - { text: "Somebody call a tow truck!", weight: 2 }
        - { text: "That's one way to take a nap!", weight: 2 }
        - { text: "Belly up! Flip it!", weight: 1 }
        - { text: "Gravity wins that round!", weight: 1 }
        - { text: "Roof inspection complete!", weight: 1 }
        - { text: "They are reading the ceiling!", weight: 1 }

    fifty_fifty:
      <<: *defaults
      cooldown_sec: 7.5
      lines:
        - { text: "Fifty-fifty! Who wants it more?!", weight: 2 }
        - { text: "Two cars, one ball, zero mercy!", weight: 2 }
        - { text: "Challenge! Don't blink!", weight: 1 }
        - { text: "Hard challenge incoming!", weight: 1 }
        - { text: "Brave souls collide!", weight: 1 }
        - { text: "This contact will decide the play!", weight: 1 }

    idle_ball:
      <<: *defaults
      cooldown_sec: 14.0
      lines:
        - { text: "Anybody gonna touch that?", weight: 2 }
        - { text: "The ball's filing for unemployment!", weight: 2 }
        - { text: "Free real estate on that ball!", weight: 1 }
        - { text: "It's lonely in midfield!", weight: 1 }
        - { text: "That ball is collecting dust!", weight: 1 }
        - { text: "Someone adopt that ball, please!", weight: 1 }

    big_boom:
      <<: *hype
      cooldown_sec: 6.5
      lines:
        - { text: "That one left a dent in spacetime!", weight: 2 }
        - { text: "Physics just filed a complaint!", weight: 2 }
        - { text: "Absolute thunderclap!", weight: 1 }
        - { text: "Send that one to NASA!", weight: 1 }
        - { text: "The stadium felt that!", weight: 1 }
        - { text: "Microphone just peaked!", weight: 1 }

    # —— Gracz: inicjatywa / docinki / pochwały ——
    player_lazy:
      <<: *defaults
      cooldown_sec: 16.0
      lines:
        - { text: "Wake up out there! The ball isn't coming to you!", weight: 2 }
        - { text: "Sightseeing tour? Get involved!", weight: 2 }
        - { text: "They're watching the game like it's TV!", weight: 1 }
        - { text: "Somebody check if that car still has a driver!", weight: 2 }
        - { text: "Initiative? Never heard of her!", weight: 1 }
        - { text: "That's a lot of standing around for a car soccer match!", weight: 1 }
        - { text: "The ball is over THERE! Hint hint!", weight: 1 }
        - { text: "Passive mode engaged. Not a compliment!", weight: 1 }
        - { text: "Did they park? Because nothing is happening!", weight: 1 }
        - { text: "Hello? Controllers still plugged in?", weight: 1 }
        - { text: "They're buffering while the match loads!", weight: 1 }
        - { text: "Statue mode. Very avant-garde. Very useless!", weight: 1 }

    player_hot:
      <<: *hype
      cooldown_sec: 12.0
      lines:
        - { text: "They're everywhere! Absolute menace!", weight: 2 }
        - { text: "Main character energy! Owning the pitch!", weight: 2 }
        - { text: "This player is cooking with gas!", weight: 2 }
        - { text: "Relentless! They want every ball!", weight: 1 }
        - { text: "That car just filed for overtime!", weight: 1 }
        - { text: "Initiative through the roof!", weight: 1 }
        - { text: "They're writing the script tonight!", weight: 1 }
        - { text: "Hungry! Starving! Devouring plays!", weight: 1 }

    player_praise:
      <<: *hype
      cooldown_sec: 9.0
      lines:
        - { text: "Beautiful touch! That's how you do it!", weight: 2 }
        - { text: "Clean play! Textbook!", weight: 2 }
        - { text: "They make it look easy!", weight: 1 }
        - { text: "Chef's kiss on that contact!", weight: 2 }
        - { text: "That's the stuff highlight reels dream of!", weight: 1 }
        - { text: "Composure! Class! Control!", weight: 1 }
        - { text: "They just earned a standing ovation!", weight: 1 }
        - { text: "Ice cold under pressure!", weight: 1 }

    player_roast:
      <<: *defaults
      cooldown_sec: 10.0
      lines:
        - { text: "Oof! That was a swing and a miss!", weight: 2 }
        - { text: "They whiffed harder than a summer breeze!", weight: 2 }
        - { text: "GPS says the ball was over there!", weight: 1 }
        - { text: "That touch needs a refund!", weight: 2 }
        - { text: "Somebody hide the replay!", weight: 1 }
        - { text: "Bold strategy. Terrible results!", weight: 1 }
        - { text: "The ball said no thank you!", weight: 1 }
        - { text: "That's going on the blooper reel!", weight: 1 }
        - { text: "My grandmother would have hit that!", weight: 1 }
        - { text: "They just invented a new way to miss!", weight: 2 }
        - { text: "Close! By the standards of another sport!", weight: 1 }
        - { text: "That was a donation to the other team!", weight: 1 }
        - { text: "Skill issue detected! Loudly!", weight: 1 }
        - { text: "They whiffed so hard the ball felt awkward!", weight: 1 }
        - { text: "Yikes! That one stung the ego!", weight: 1 }

    player_hustle:
      <<: *defaults
      cooldown_sec: 11.0
      lines:
        - { text: "Look at that hustle! Closing the gap!", weight: 2 }
        - { text: "They're flying across the pitch!", weight: 2 }
        - { text: "Recovery run! Pure work rate!", weight: 1 }
        - { text: "Boots to the metal! Love to see it!", weight: 1 }
        - { text: "That chase is personal!", weight: 1 }
        - { text: "They refuse to give up the play!", weight: 1 }

    player_spectator:
      <<: *defaults
      cooldown_sec: 15.0
      lines:
        - { text: "Great view from the cheap seats!", weight: 2 }
        - { text: "They're taking notes instead of touches!", weight: 2 }
        - { text: "Camera operator energy from that car!", weight: 1 }
        - { text: "The action is happening without them!", weight: 1 }
        - { text: "Someone page the driver!", weight: 1 }
        - { text: "Participation trophy still available!", weight: 1 }
        - { text: "They're spectating their own match!", weight: 1 }
        - { text: "Front row seats, zero involvement!", weight: 1 }
        - { text: "Is that car AFK? Asking for a friend!", weight: 1 }

    # —— Drużyny: pochwały / docinki ——
    blue_praise:
      <<: *hype
      cooldown_sec: 11.0
      lines:
        - { text: "Blue looking sharp! Clockwork!", weight: 2 }
        - { text: "Blue are clicking tonight!", weight: 2 }
        - { text: "That's Blue chemistry right there!", weight: 1 }
        - { text: "Blue mean business!", weight: 1 }
        - { text: "Blue with the clinic!", weight: 1 }
        - { text: "Paint it blue! They own this stretch!", weight: 1 }

    orange_praise:
      <<: *hype
      cooldown_sec: 11.0
      lines:
        - { text: "Orange on fire! Keep that heat!", weight: 2 }
        - { text: "Orange are cooking!", weight: 2 }
        - { text: "That's Orange swagger!", weight: 1 }
        - { text: "Orange with the answer!", weight: 1 }
        - { text: "Orange turning up the thermostat!", weight: 1 }
        - { text: "Sunset squad looking lethal!", weight: 1 }

    blue_roast:
      <<: *defaults
      cooldown_sec: 11.0
      lines:
        - { text: "Blue, that was amateur hour!", weight: 2 }
        - { text: "Blue just gifted the ball!", weight: 2 }
        - { text: "Wake up, Blue! Sleepwalking!", weight: 1 }
        - { text: "Blue defending with a welcome mat!", weight: 1 }
        - { text: "Blue, my grandmother hits harder!", weight: 1 }
        - { text: "Blue looking lost in their own half!", weight: 1 }
        - { text: "Blue, that turnover was criminal!", weight: 1 }
        - { text: "Blue are playing hot potato with the ball!", weight: 1 }
        - { text: "Blue defense just opened a gift shop!", weight: 2 }
        - { text: "Somebody reboot Blue's firmware!", weight: 1 }
        - { text: "Blue, that was soft. Marshmallow soft!", weight: 1 }

    orange_roast:
      <<: *defaults
      cooldown_sec: 11.0
      lines:
        - { text: "Orange, that was a soft serve!", weight: 2 }
        - { text: "Orange just mailed it in!", weight: 2 }
        - { text: "Come on, Orange! Tighten up!", weight: 1 }
        - { text: "Orange defending like it's optional!", weight: 1 }
        - { text: "Orange, the ball is not a hot potato!", weight: 1 }
        - { text: "Orange looking allergic to the ball!", weight: 1 }
        - { text: "Orange, that giveaway was generous!", weight: 1 }
        - { text: "Orange just donated possession!", weight: 1 }
        - { text: "Orange defense went on vacation!", weight: 2 }
        - { text: "Wake up call for Orange! Anyone home?", weight: 1 }
        - { text: "Orange, that was butter fingers on wheels!", weight: 1 }

    score_taunt:
      <<: *defaults
      cooldown_sec: 14.0
      lines:
        - { text: "The scoreboard is doing the talking!", weight: 2 }
        - { text: "One team is writing a statement!", weight: 2 }
        - { text: "This is turning into a clinic!", weight: 1 }
        - { text: "The gap is getting rude!", weight: 1 }
        - { text: "Somebody call a comeback, quick!", weight: 1 }
        - { text: "Blowout vibes creeping in!", weight: 1 }
        - { text: "This scoreline is getting personal!", weight: 1 }
        - { text: "Mercy rule whispering in the hallway!", weight: 1 }
        - { text: "The underdogs need a miracle and a snack!", weight: 1 }

    # Uwaga TTS: unikaj skrótów (RNG) i samotnego „Ignite”/ALL-CAPS — XTTS literuje.
